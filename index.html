<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>Əsl UNO - Mobil & Çat Versiyası</title>
<!-- 🔥 FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Black', Gadget, sans-serif; user-select: none; }
        body { background: radial-gradient(circle, #1a0b2e 0%, #090314 100%); color: white; min-height: 100vh; display: flex; justify-content: center; padding: 10px; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #ff007f; text-shadow: 0 0 10px #ff007f; margin-bottom: 10px; font-size: 1.6rem; }
        
        /* LOBBY */
        .lobby-section { background: rgba(25, 10, 50, 0.9); padding: 20px; border-radius: 20px; border: 2px solid #ff007f; box-shadow: 0 0 20px rgba(255, 0, 127, 0.3); }
        .controls { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: 0 auto 20px auto; }
        input { padding: 12px; border: 2px solid #3d1475; border-radius: 10px; background: #120626; color: white; font-size: 16px; text-align: center; outline: none; }
        button { background: linear-gradient(45deg, #ff5555, #ffaa00); color: white; border: 2px solid white; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; text-shadow: 1px 1px 2px black; }
        button:hover { transform: scale(1.02); }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .room-card { background: #190a32; padding: 15px; border-radius: 12px; border: 1px solid #3d1475; text-align: center; }
        .room-card button { padding: 6px; font-size: 13px; margin-top: 8px; width: 100%; }

        /* OYUN SAHƏSİ LAYOUT */
        .game-room-section { display: none; width: 100%; }
        .game-layout { display: flex; flex-direction: column; gap: 10px; }
        
        /* HƏQİQİ DAİRƏVİ ARENA */
        .game-arena { position: relative; width: 100%; height: 320px; background: radial-gradient(circle, #1c5235 0%, #0d2b1a 100%); border-radius: 25px; border: 4px solid #111; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); margin-bottom: 5px; }
        .center-deck { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 12px; z-index: 10; }

        /* OYUNÇU YERLƏRİ */
        .player-seat { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90px; text-align: center; z-index: 5; }
        .seat-bottom { bottom: 8px; left: 50%; transform: translateX(-50%); }
        .seat-left   { left: 8px; top: 50%; transform: translateY(-50%); }
        .seat-top    { top: 8px; left: 50%; transform: translateX(-50%); }
        .seat-right  { right: 8px; top: 50%; transform: translateY(-50%); }

        .avatar-wrapper { position: relative; width: 45px; height: 45px; border-radius: 50%; border: 2.5px solid #fff; background: #2a1b4e; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .active-turn .avatar-wrapper { border-color: #00ffcc; box-shadow: 0 0 12px #00ffcc; animation: pulse 1.5s infinite; }
        .player-name { font-size: 11px; font-weight: bold; margin-top: 3px; background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85px; }
        .card-count-badge { background: #ff5555; border: 1px solid white; color: white; font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-top: 1px; }

        /* ÇAT MESAJ BULUDU (BUBBLE) */
        .chat-bubble { position: absolute; top: -35px; background: white; color: black; padding: 4px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; max-width: 100px; display: none; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* ƏSL HƏQİQİ UNO KART DİZAYNI */
        .uno-card { width: 58px; height: 88px; border-radius: 6px; border: 2.5px solid white; position: relative; box-shadow: 0 3px 6px rgba(0,0,0,0.4); cursor: pointer; display: inline-block; overflow: hidden; background-color: #111; }
        .uno-card::before { content: ""; position: absolute; width: 120%; height: 65%; background: white; top: 18%; left: -10%; transform: rotate(-28deg); border-radius: 50%; z-index: 1; opacity: 0.95; }
        .card-center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); font-size: 24px; font-weight: 900; z-index: 2; text-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        .card-corner-text { position: absolute; font-size: 10px; font-weight: bold; color: white; z-index: 2; top: 2px; left: 4px; }
        .card-corner-text.bottom-right { top: auto; left: auto; bottom: 2px; right: 4px; transform: rotate(180deg); }

        /* UNO Orijinal Rəng Kodları */
        .card-red { background-color: #ff5555; } .card-red .card-center-text { color: #ff5555; }
        .card-blue { background-color: #0055ff; } .card-blue .card-center-text { color: #0055ff; }
        .card-green { background-color: #00aa55; } .card-green .card-center-text { color: #00aa55; }
        .card-yellow { background-color: #ffaa00; } .card-yellow .card-center-text { color: #ffaa00; }
        
        .card-black { background-color: #111; }
        .card-black::before { background: linear-gradient(45deg, #ff5555, #0055ff, #00aa55, #ffaa00); }
        .card-black .card-center-text { color: white; font-size: 16px; }

        .card-back { background-color: #ff5555; }
        .card-back::before { background: #111; width: 100%; height: 60%; top: 20%; left: 0; transform: rotate(-20deg); }
        .card-back .card-center-text { color: #ffaa00; font-size: 13px; font-style: italic; }

        /* SƏNİN ƏLİN */
        .my-hand-container { width: 100%; background: rgba(0,0,0,0.4); padding: 10px 5px; border-radius: 15px; text-align: center; overflow-x: auto; white-space: nowrap; }
        .my-hand { display: inline-flex; padding-right: 20px; }
        .my-hand .uno-card { margin-right: -20px; transition: transform 0.2s; }
        .my-hand .uno-card:hover { transform: translateY(-15px) scale(1.1) !important; z-index: 100 !important; }

        /* ÇAT PANELİ */
        .chat-panel { width: 100%; background: rgba(20, 10, 40, 0.85); border: 2px solid #ff007f; border-radius: 15px; display: flex; flex-direction: column; height: 160px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
        .msg-item { background: rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 8px; line-height: 1.4; }
        .msg-item b { color: #00f0ff; }
        .chat-input-area { display: flex; background: #120626; padding: 5px; }
        .chat-input-area input { flex: 1; padding: 8px; border-radius: 6px 0 0 6px; font-size: 13px; text-align: left; background: #1a0a3a; color: white; border: none; outline: none; }
        .chat-input-area button { padding: 8px 12px; border-radius: 0 6px 6px 0; font-size: 13px; border: none; }

        /* Responisve Desktop */
        @media (min-width: 768px) {
            .game-layout { flex-direction: row; }
            .game-arena { height: 420px; flex: 1; }
            .chat-panel { width: 280px; height: 420px; }
            .uno-card { width: 70px; height: 105px; border-radius: 8px; }
            .card-center-text { font-size: 30px; }
            .card-corner-text { font-size: 12px; }
            .player-seat { width: 110px; }
            .avatar-wrapper { width: 55px; height: 55px; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 3px #00ffcc; }
            50% { box-shadow: 0 0 12px #00ffcc; }
            100% { box-shadow: 0 0 3px #00ffcc; }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<div class="app-container">
    <h1>🎨 NK UNO LIVE</h1>

    <div id="lobby-page" class="lobby-section">
        <div class="controls">
            <input type="text" id="username" placeholder="Adınız...">
            <input type="text" id="room-name-input" placeholder="Otaq Adı (Məcburi deyil)">
            <button onclick="createNewRoom()">✨ Otaq Yarat</button>
        </div>
        <h3 style="color:#00f0ff; font-size:1rem; margin-bottom:8px;">Aktiv Çat Otaqları</h3>
        <div id="rooms-list" class="rooms-grid"></div>
    </div>

    <div id="game-room-page" class="game-room-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
            <span id="active-room-title" style="color: #00f0ff; font-size: 13px;">Otaq: #0000</span>
            <button style="padding:4px 10px; font-size:12px; background:#444;" onclick="location.reload()">🚪 Çıx</button>
        </div>
        
        <div class="game-layout">
            <div class="game-arena">
                <div class="player-seat seat-left" id="p-left" style="opacity:0.2;">
                    <div class="chat-bubble" id="bubble-left"></div>
                    <div class="avatar-wrapper">🦊</div>
                    <div class="player-name">Gözlənilir</div>
                    <div class="card-count-badge">0 Kart</div>
                </div>
                <div class="player-seat seat-top" id="p-top" style="opacity:0.2;">
                    <div class="chat-bubble" id="bubble-top"></div>
                    <div class="avatar-wrapper">🐼</div>
                    <div class="player-name">Gözlənilir</div>
                    <div class="card-count-badge">0 Kart</div>
                </div>
                <div class="player-seat seat-right" id="p-right" style="opacity:0.2;">
                    <div class="chat-bubble" id="bubble-right"></div>
                    <div class="avatar-wrapper">🦁</div>
                    <div class="player-name">Gözlənilir</div>
                    <div class="card-count-badge">0 Kart</div>
                </div>

                <div class="center-deck">
                    <div class="uno-card card-back" onclick="drawCardFromDeck()">
                        <div class="card-center-text">UNO</div>
                    </div>
                    <div id="top-card-container">
                        <div class="uno-card card-blue"><div class="card-corner-text">0</div><div class="card-center-text">0</div><div class="card-corner-text bottom-right">0</div></div>
                    </div>
                </div>

                <div class="player-seat seat-bottom" id="p-bottom">
                    <div class="chat-bubble" id="bubble-bottom"></div>
                    <div class="avatar-wrapper">👤</div>
                    <div class="player-name" id="my-display-name">Sən</div>
                    <div class="card-count-badge" id="cnt-my">0 Kart</div>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-messages" id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Mesaj..." onkeypress="if(event.key==='Enter') sendRoomMessage()">
                    <button onclick="sendRoomMessage()">✉️</button>
                </div>
            </div>
        </div>

        <div class="my-hand-container">
            <div class="my-hand" id="my-cards-hand"></div>
        </div>
    </div>
</div>

<script>
    // ⚠️ BU HİSSƏYƏ ÖZ RENDER LİNKİNİ YAPIŞDIR! (Axırında '/' işarəsi olmasın)
    const socket = io('https://uno-games-m94d.onrender.com'); 
    
    let currentRoomId = null;
    let myUsername = "";
    let seatMapping = {}; 

    socket.on('update-room-list', (rooms) => {
        const container = document.getElementById('rooms-list');
        container.innerHTML = "";
        if(rooms.length === 0) {
            container.innerHTML = `<p style="color:#aaa; font-size:12px; grid-column: 1/-1;">Aktiv otaq yoxdur, ilk otağı sən yarat! 👇</p>`;
        }
        rooms.forEach(room => {
            container.innerHTML += `
                <div class="room-card">
                    <div style="font-size:12px; font-weight:bold;">${room.title}</div>
                    <div style="font-size:11px; color:#aaa;">Oyunçu: ${room.count}/4</div>
                    <button onclick="joinRoom('${room.id}')">Gir</button>
                </div>`;
        });
    });

    function createNewRoom() {
        myUsername = document.getElementById('username').value.trim();
        const roomName = document.getElementById('room-name-input').value.trim();
        if (!myUsername) return alert("Adınızı yazın!");
        socket.emit('create-room', { username: myUsername, roomName });
    }

    function joinRoom(roomId) {
        myUsername = document.getElementById('username').value.trim();
        if (!myUsername) return alert("Adınızı yazın!");
        socket.emit('join-room', { roomId, username: myUsername });
    }

    socket.on('room-joined', ({ roomId, title, players }) => {
        currentRoomId = roomId;
        document.getElementById('lobby-page').style.display = 'none';
        document.getElementById('game-room-page').style.display = 'block';
        document.getElementById('active-room-title').innerText = "Otaq: " + title;
        renderSeats(players);
    });

    function renderSeats(players) {
        const myIndex = players.findIndex(p => p.id === socket.id);
        if(myIndex === -1) return;
        
        document.getElementById('my-display-name').innerText = players[myIndex].username;
        document.getElementById('cnt-my').innerText = `${players[myIndex].cardCount} Kart`;

        let seats = ['p-left', 'p-top', 'p-right'];
        let bubbles = ['bubble-left', 'bubble-top', 'bubble-right'];
        let seatIdx = 0;
        
        seatMapping = { [socket.id]: { seat: 'p-bottom', bubble: 'bubble-bottom' } };

        players.forEach((p, index) => {
            if (index !== myIndex && seatIdx < 3) {
                let seatEl = document.getElementById(seats[seatIdx]);
                seatEl.querySelector('.player-name').innerText = p.username;
                seatEl.querySelector('.card-count-badge').innerText = `${p.cardCount} Kart`;
                seatEl.style.opacity = "1";
                
                seatMapping[p.id] = { seat: seats[seatIdx], bubble: bubbles[seatIdx] };
                seatIdx++;
            }
        });

        for(let i = seatIdx; i < 3; i++) {
            let seatEl = document.getElementById(seats[i]);
            seatEl.style.opacity = "0.2";
            seatEl.querySelector('.player-name').innerText = "Gözlənilir";
            seatEl.querySelector('.card-count-badge').innerText = "0 Kart";
        }
    }

    function sendRoomMessage() {
        const input = document.getElementById('msg-input');
        const msg = input.value.trim();
        if(!msg || !currentRoomId) return;
        socket.emit('send-message', { roomId: currentRoomId, message: msg, username: myUsername });
        input.value = "";
    }

    socket.on('receive-message', ({ senderId, username, text }) => {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg-item"><b>${username}:</b> ${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight; 

        if (seatMapping[senderId]) {
            const bubbleEl = document.getElementById(seatMapping[senderId].bubble);
            bubbleEl.innerText = text;
            bubbleEl.style.display = 'block';
            setTimeout(() => { bubbleEl.style.display = 'none'; }, 3000);
        }
    });

    function drawCardFromDeck() {
        if(document.getElementById('active-room-title').getAttribute('data-status') !== 'playing') {
            socket.emit('start-game', currentRoomId);
        } else {
            socket.emit('draw-card', currentRoomId);
        }
    }

    socket.on('game-started', ({ topCard, currentTurnId, players }) => {
        document.getElementById('active-room-title').setAttribute('data-status', 'playing');
        updateTable(topCard, currentTurnId, players);
    });

    socket.on('game-updated', ({ topCard, currentTurnId, players }) => {
        updateTable(topCard, currentTurnId, players);
    });

    function generateCardHTML(card) {
        let displayType = card.type;
        return `
            <div class="uno-card card-${card.color}">
                <div class="card-corner-text">${displayType}</div>
                <div class="card-center-text">${displayType}</div>
                <div class="card-corner-text bottom-right">${displayType}</div>
            </div>`;
    }

    socket.on('your-cards', (cards) => {
        const handContainer = document.getElementById('my-cards-hand');
        handContainer.innerHTML = "";
        cards.forEach((card, idx) => {
            const wrapper = document.createElement('div');
            wrapper.style.display = "inline-block";
            wrapper.innerHTML = generateCardHTML(card);
            
            const cardDiv = wrapper.firstElementChild;
            cardDiv.style.transform = `rotate(${(idx - cards.length/2) * 2}deg) translateY(${Math.abs(idx - cards.length/2) * 1}px)`;
            
            cardDiv.onclick = function() {
                let chosenColor = null;
                if(card.color === 'black') chosenColor = prompt("Rəng seçin: red, blue, green, yellow");
                socket.emit('play-card', { roomId: currentRoomId, card, chosenColor });
            };
            handContainer.appendChild(cardDiv);
        });
    });

    function updateTable(topCard, currentTurnId, players) {
        const container = document.getElementById('top-card-container');
        container.innerHTML = generateCardHTML(topCard);

        renderSeats(players);

        Object.keys(seatMapping).forEach(id => {
            const seatElement = document.getElementById(seatMapping[id].seat);
            if(seatElement) {
                if(id === currentTurnId) seatElement.classList.add('active-turn');
                else seatElement.classList.remove('active-turn');
            }
        });
    }

    // 🔥 XÜSUSİ UNO KART BİLDİRİŞLƏRİ (+2, PAS, YÖN DƏYİŞMƏ)
    socket.on('special-card-log', (text) => {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg-item" style="background:rgba(255, 170, 0, 0.15); border-left: 3px solid #ffaa00; font-weight:bold; color:#ffaa00;">📢 ${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // OYUN BİTDİKDƏ QALİBİN ELAN EDİLMƏSİ
    socket.on('game-over', ({ winner }) => {
        alert(`🎉 TƏBRİKLƏR! Oyun bitdi. Qalib: ${winner}`);
        location.reload(); 
    });

    socket.on('error-msg', (msg) => alert(msg));
</script>
</body>
</html>
