<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WePlay UNO - Canlı Chat və Əsl Kartlar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle, #1a0b2e 0%, #090314 100%); color: white; padding: 20px; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #ff007f; text-shadow: 0 0 10px #ff007f; margin-bottom: 15px; font-size: 2rem; }
        
        /* LOBBY SƏHİFƏSİ */
        .lobby-section { background: rgba(25, 10, 50, 0.85); padding: 30px; border-radius: 20px; border: 2px solid #ff007f; box-shadow: 0 0 20px rgba(255, 0, 127, 0.3); }
        .controls { display: flex; gap: 15px; max-width: 600px; margin: 0 auto 30px auto; justify-content: center; flex-wrap: wrap; }
        input { padding: 14px; border: 2px solid #3d1475; border-radius: 10px; background: #120626; color: white; font-size: 16px; text-align: center; outline: none; }
        
        button { background: linear-gradient(45deg, #ff007f, #7928ca); color: white; border: none; padding: 14px 25px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); }

        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .room-card { background: #190a32; padding: 20px; border-radius: 15px; border: 1px solid #3d1475; display: flex; flex-direction: column; justify-content: space-between; }
        .room-card button { padding: 8px 15px; font-size: 14px; width: 100%; margin-top: 10px;}

        /* OYUN LAYOUT */
        .game-room-section { display: none; width: 100%; }
        .game-layout { display: flex; gap: 20px; margin-top: 15px; }
        
        /* DAİRƏVİ ARENA */
        .game-arena { position: relative; flex: 1; height: 530px; background: radial-gradient(circle, #153e31 0%, #0a1f18 100%); border-radius: 30px; border: 5px solid #252525; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); }
        .center-deck { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 20px; z-index: 10; }

        /* OYUNÇULAR */
        .player-seat { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 150px; text-align: center; }
        .seat-bottom { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .seat-left   { left: 15px; top: 50%; transform: translateY(-50%); }
        .seat-top    { top: 15px; left: 50%; transform: translateX(-50%); }
        .seat-right  { right: 15px; top: 50%; transform: translateY(-50%); }

        .avatar-wrapper { position: relative; width: 65px; height: 65px; border-radius: 50%; border: 3px solid #333; background: #2a1b4e; display: flex; justify-content: center; align-items: center; }
        .avatar-img { font-size: 28px; }
        .active-turn .avatar-wrapper { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; animation: pulse 1.5s infinite; }
        .player-name { font-size: 13px; font-weight: bold; margin-top: 4px; }
        .card-count-badge { background: #ff007f; color: white; font-size: 11px; padding: 1px 6px; border-radius: 10px; margin-top: 2px; }

        /* PROFiL ÜSTÜ MESAJ BULUDU (BUBBLE) */
        .chat-bubble { position: absolute; top: -45px; background: white; color: black; padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; max-width: 140px; word-wrap: break-word; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; z-index: 100; }
        .chat-bubble::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: white transparent; display: block; width: 0; }

        /* ÇAT PANELİ */
        .chat-panel { width: 300px; background: rgba(20, 10, 40, 0.8); border: 2px solid #ff007f; border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; height: 530px; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-item { background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; max-width: 90%; }
        .msg-item b { color: #00f0ff; }
        .chat-input-area { display: flex; background: #120626; border-top: 1px solid #3d1475; padding: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 8px 0 0 8px; border: none; font-size: 14px; text-align: left; background: #1a0a3a; color: white; outline: none; }
        .chat-input-area button { padding: 10px 15px; border-radius: 0 8px 8px 0; font-size: 14px; }

        /* KART STİLLƏRİ */
        .uno-card { width: 80px; height: 120px; border-radius: 10px; border: 3px solid white; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; color: white; cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.5); user-select: none; }
        .card-red { background: #ff3366; } .card-blue { background: #3399ff; } .card-green { background: #33cc66; } .card-yellow { background: #ffcc00; color: #222; } .card-black { background: #111; border-color: #ff007f; }
        .card-back { background: #111; border-color: #ff007f; font-size: 13px; color: #ff007f; text-align: center;}
        .card-corner { position: absolute; font-size: 11px; top: 4px; left: 6px; }

        .my-hand-container { margin-top: 15px; text-align: center; }
        .my-hand { display: flex; justify-content: center; padding: 10px; min-height: 140px; }
        .my-hand .uno-card { margin-right: -15px; transition: 0.2s; }
        .my-hand .uno-card:hover { transform: translateY(-20px) scale(1.1) !important; z-index: 999 !important; }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px #00ffcc; }
            50% { box-shadow: 0 0 15px #00ffcc; }
            100% { box-shadow: 0 0 5px #00ffcc; }
        }
    </style>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<div class="app-container">
    <h1>🎮 WEPLAY UNO (CHAT VERSION)</h1>

    <div id="lobby-page" class="lobby-section">
        <div class="controls">
            <input type="text" id="username" placeholder="Adınız...">
            <input type="text" id="room-name-input" placeholder="Otaq Adı">
            <button onclick="createNewRoom()">✨ Otaq Yarat</button>
        </div>
        <h2 style="text-align:left; color:#00f0ff; font-size:1.2rem; margin-bottom:10px;">Aktiv Çat Otaqları</h2>
        <div id="rooms-list" class="rooms-grid"></div>
    </div>

    <div id="game-room-page" class="game-room-section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="active-room-title" style="color: #00f0ff;">Otaq: #0000</h2>
            <button style="padding:6px 15px; background:#444;" onclick="location.reload()">🚪 Çıx</button>
        </div>
        
        <div class="game-layout">
            <div class="game-arena">
                <div class="player-seat seat-left" id="p-left" style="opacity:0.3;">
                    <div class="chat-bubble" id="bubble-left"></div>
                    <div class="avatar-wrapper"><span class="avatar-img">🦊</span></div>
                    <div class="player-name">Gözlənilir...</div>
                    <div class="card-count-badge">0 Kart</div>
                </div>

                <div class="player-seat seat-top" id="p-top" style="opacity:0.3;">
                    <div class="chat-bubble" id="bubble-top"></div>
                    <div class="avatar-wrapper"><span class="avatar-img">🐼</span></div>
                    <div class="player-name">Gözlənilir...</div>
                    <div class="card-count-badge">0 Kart</div>
                </div>

                <div class="player-seat seat-right" id="p-right" style="opacity:0.3;">
                    <div class="chat-bubble" id="bubble-right"></div>
                    <div class="avatar-wrapper"><span class="avatar-img">🦁</span></div>
                    <div class="player-name">Gözlənilir...</div>
                    <div class="card-count-badge">0 Kart</div>
                </div>

                <div class="center-deck">
                    <div class="uno-card card-back" onclick="drawCardFromDeck()">
                        <div style="font-size:16px;">UNO</div>
                        <div style="font-size:8px; color:#ff007f; margin-top:3px;">BAŞLA / ÇƏK</div>
                    </div>
                    <div id="top-card" class="uno-card card-blue">5</div>
                </div>

                <div class="player-seat seat-bottom" id="p-bottom">
                    <div class="chat-bubble" id="bubble-bottom"></div>
                    <div class="avatar-wrapper"><span class="avatar-img">👤</span></div>
                    <div class="player-name" id="my-display-name">Sən</div>
                    <div class="card-count-badge" id="cnt-my">0 Kart</div>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-messages" id="chat-box">
                    <div class="msg-item" style="color:#aaa; text-align:center;">Otaq çatı aktivləşdirildi.</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') sendRoomMessage()">
                    <button onclick="sendRoomMessage()">Gönder</button>
                </div>
            </div>
        </div>

        <div class="my-hand-container">
            <div class="my-hand" id="my-cards-hand"></div>
        </div>
    </div>
</div>

<script>
    // ⚠️ BU HİSSƏYƏ ÖZ RENDER LİNKİNİ YAPIŞDIR! (Axırında '/' işarəsi olmasın)
    const socket = io('https://uno-games-m94d.onrender.com'); 
    
    let currentRoomId = null;
    let myUsername = "";
    let seatMapping = {}; 

    socket.on('update-room-list', (rooms) => {
        const container = document.getElementById('rooms-list');
        container.innerHTML = "";
        if(rooms.length === 0) {
            container.innerHTML = `<p style="color:#aaa; padding:10px;">Aktiv otaq yoxdur, birincini sən yarat! ✨</p>`;
        }
        rooms.forEach(room => {
            container.innerHTML += `
                <div class="room-card">
                    <div>
                        <h3>💬 ${room.title}</h3>
                        <p>Oyunçu: ${room.count} / 4</p>
                    </div>
                    <button onclick="joinRoom('${room.id}')">Daxil Ol</button>
                </div>`;
        });
    });

    function createNewRoom() {
        myUsername = document.getElementById('username').value.trim();
        const roomName = document.getElementById('room-name-input').value.trim();
        if (!myUsername) return alert("Adınızı yazın!");
        socket.emit('create-room', { username: myUsername, roomName });
    }

    function joinRoom(roomId) {
        myUsername = document.getElementById('username').value.trim();
        if (!myUsername) return alert("Adınızı yazın!");
        socket.emit('join-room', { roomId, username: myUsername });
    }

    socket.on('room-joined', ({ roomId, title, players }) => {
        currentRoomId = roomId;
        document.getElementById('lobby-page').style.display = 'none';
        document.getElementById('game-room-page').style.display = 'block';
        document.getElementById('active-room-title').innerText = "Otaq: " + title;

        renderSeats(players);
    });

    function renderSeats(players) {
        const myIndex = players.findIndex(p => p.id === socket.id);
        if(myIndex === -1) return;
        
        document.getElementById('my-display-name').innerText = players[myIndex].username + " (Sən)";
        document.getElementById('cnt-my').innerText = `${players[myIndex].cardCount} Kart`;

        let seats = ['p-left', 'p-top', 'p-right'];
        let bubbles = ['bubble-left', 'bubble-top', 'bubble-right'];
        let seatIdx = 0;
        
        seatMapping = { [socket.id]: { seat: 'p-bottom', bubble: 'bubble-bottom' } };

        players.forEach((p, index) => {
            if (index !== myIndex && seatIdx < 3) {
                let seatEl = document.getElementById(seats[seatIdx]);
                seatEl.querySelector('.player-name').innerText = p.username;
                seatEl.querySelector('.card-count-badge').innerText = `${p.cardCount} Kart`;
                seatEl.style.opacity = "1";
                
                seatMapping[p.id] = { seat: seats[seatIdx], bubble: bubbles[seatIdx] };
                seatIdx++;
            }
        });

        for(let i = seatIdx; i < 3; i++) {
            let seatEl = document.getElementById(seats[i]);
            seatEl.style.opacity = "0.3";
            seatEl.querySelector('.player-name').innerText = "Gözlənilir...";
            seatEl.querySelector('.card-count-badge').innerText = "0 Kart";
        }
    }

    function sendRoomMessage() {
        const input = document.getElementById('msg-input');
        const msg = input.value.trim();
        if(!msg || !currentRoomId) return;

        socket.emit('send-message', { roomId: currentRoomId, message: msg, username: myUsername });
        input.value = "";
    }

    socket.on('receive-message', ({ senderId, username, text }) => {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg-item"><b>${username}:</b> ${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight; 

        if (seatMapping[senderId]) {
            const bubbleId = seatMapping[senderId].bubble;
            const bubbleEl = document.getElementById(bubbleId);
            
            bubbleEl.innerText = text;
            bubbleEl.style.display = 'block';

            setTimeout(() => {
                bubbleEl.style.display = 'none';
            }, 4000);
        }
    });

    function drawCardFromDeck() {
        if(document.getElementById('active-room-title').getAttribute('data-status') !== 'playing') {
            socket.emit('start-game', currentRoomId);
        } else {
            socket.emit('draw-card', currentRoomId);
        }
    }

    socket.on('game-started', ({ topCard, currentTurnId, players }) => {
        document.getElementById('active-room-title').setAttribute('data-status', 'playing');
        updateTable(topCard, currentTurnId, players);
    });

    socket.on('game-updated', ({ topCard, currentTurnId, players }) => {
        updateTable(topCard, currentTurnId, players);
    });

    socket.on('your-cards', (cards) => {
        const handContainer = document.getElementById('my-cards-hand');
        handContainer.innerHTML = "";
        cards.forEach(card => {
            const cardDiv = document.createElement('div');
            cardDiv.className = `uno-card card-${card.color}`;
            cardDiv.innerHTML = `<div class="card-corner">${card.type}</div><div>${card.type}</div>`;
            cardDiv.onclick = function() {
                let chosenColor = null;
                if(card.color === 'black') chosenColor = prompt("Yeni rəngi seçin: red, blue, green, yellow");
                socket.emit('play-card', { roomId: currentRoomId, card, chosenColor });
            };
            handContainer.appendChild(cardDiv);
        });
    });

    function updateTable(topCard, currentTurnId, players) {
        const topCardDiv = document.getElementById('top-card');
        topCardDiv.className = `uno-card card-${topCard.color}`;
        topCardDiv.innerHTML = `<div class="card-corner">${topCard.type}</div><div>${topCard.type}</div>`;

        renderSeats(players);

        Object.keys(seatMapping).forEach(id => {
            const seatElement = document.getElementById(seatMapping[id].seat);
            if(seatElement) {
                if(id === currentTurnId) seatElement.classList.add('active-turn');
                else seatElement.classList.remove('active-turn');
            }
        });
    }

    socket.on('error-msg', (msg) => alert(msg));
</script>
</body>
</html>
